<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <!-- Background -->
  <rect width="400" height="250" fill="#FEF9F0"/>

  <!-- Decorative grid lines -->
  <line x1="0" y1="50" x2="400" y2="50" stroke="#FBBF24" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="100" x2="400" y2="100" stroke="#FBBF24" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="150" x2="400" y2="150" stroke="#FBBF24" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="#FBBF24" stroke-width="0.5" opacity="0.3"/>
  <line x1="80" y1="0" x2="80" y2="250" stroke="#FBBF24" stroke-width="0.5" opacity="0.3"/>
  <line x1="160" y1="0" x2="160" y2="250" stroke="#FBBF24" stroke-width="0.5" opacity="0.3"/>
  <line x1="240" y1="0" x2="240" y2="250" stroke="#FBBF24" stroke-width="0.5" opacity="0.3"/>
  <line x1="320" y1="0" x2="320" y2="250" stroke="#FBBF24" stroke-width="0.5" opacity="0.3"/>

  <!-- Philippine sun rays (background decoration) -->
  <circle cx="340" cy="40" r="60" fill="#FDE68A" opacity="0.25"/>
  <circle cx="340" cy="40" r="38" fill="#FDE68A" opacity="0.3"/>

  <!-- Three comparison bars -->
  <!-- Itemised bar -->
  <rect x="50" y="130" width="60" height="90" rx="4" fill="#3B82F6" opacity="0.85"/>
  <text x="80" y="120" text-anchor="middle" fill="#3B82F6" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Itemised</text>

  <!-- OSD bar -->
  <rect x="130" y="110" width="60" height="110" rx="4" fill="#8B5CF6" opacity="0.85"/>
  <text x="160" y="100" text-anchor="middle" fill="#8B5CF6" font-family="system-ui,sans-serif" font-size="10" font-weight="600">40% OSD</text>

  <!-- 8% bar (shortest = best) -->
  <rect x="210" y="155" width="60" height="65" rx="4" fill="#10B981" opacity="0.9"/>
  <text x="240" y="145" text-anchor="middle" fill="#10B981" font-family="system-ui,sans-serif" font-size="10" font-weight="600">8% Rate</text>

  <!-- Star/best marker on 8% bar -->
  <circle cx="240" cy="155" r="12" fill="#10B981"/>
  <text x="240" y="159" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11">★</text>

  <!-- Baseline -->
  <line x1="40" y1="220" x2="290" y2="220" stroke="#6B7280" stroke-width="1.5" opacity="0.4"/>

  <!-- Peso symbol -->
  <text x="315" y="145" text-anchor="middle" fill="#1D4ED8" font-family="system-ui,sans-serif" font-size="54" font-weight="700" opacity="0.12">₱</text>
  <text x="315" y="145" text-anchor="middle" fill="#1D4ED8" font-family="system-ui,sans-serif" font-size="52" font-weight="700" opacity="0.18">₱</text>

  <!-- Label -->
  <text x="30" y="30" fill="#92400E" font-family="system-ui,sans-serif" font-size="11" font-weight="600" opacity="0.7">PH Tax 2026</text>
</svg>
